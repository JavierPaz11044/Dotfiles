# Font: JetBrainsMono from Dotfiles/fonts (alternatives: FiraMono Nerd Font Mono, UbuntuMono Nerd Font Mono)
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
disable_ligatures never

# Window
window_padding_width 10
draw_minimal_borders no
remember_window_size no
confirm_os_window_close 0

# Cursor
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
click_interval     0.2
mouse_hide_wait    3.0

# Bell
enable_audio_bell  no

# Terminal
term xterm-kitty
shell_integration  enabled

# Tab bar
tab_bar_style       powerline
tab_bar_edge        bottom
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Layouts
enabled_layouts tall:all:bias=50;full_size=1;mirrored=false

# Keyboard shortcuts (Linux)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+k     combine : clear_terminal scrollback active : send_text normal \x0c

